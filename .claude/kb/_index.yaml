# Domains are added as content stabilizes. See .claude/STRUCTURE_GUIDE.md
# § Self-Improvement Protocol for the trigger and bootstrap steps.
#
# Likely first domains for this project:
#   - rag-retrieval     (Sprint 1+: hybrid BM25+dense, chunking, expected_doc_ids)
#   - rag-eval          (Sprint 2+: per-fact judge, recall@k, abstention)
#   - observability     (Sprint 3+: OTel, Langfuse/Phoenix, failure taxonomy)
#
# Domain entry shape — the single SSoT is _templates/domain-manifest.yaml.template.
# kb-architect copies that block in here when registering a domain.
domains:
  rag-eval:
    name: RAG Eval
    description: >
      LLM-as-judge evaluation of RAG answers — per-fact recall/precision scoring
      against gold answer_facts, doc-level (per-doc_id) citation faithfulness, the
      None empty-denominator/abstention convention, structured-output judge prompting,
      judge determinism (strict schema + discrete verdict vocabulary), retrieval metric
      aggregation (per-category, None-skipping, dedup-before-metrics), abstention
      scoring (empty-gold predicate, two-layer gate+generator, sentinel enforcement),
      cassette/replay testing with vcrpy (ADR-0006), multi-model sweep runner
      (single retriever, crash-safe JSONL flush, cost ceiling, transient-error skip
      — _TRANSIENT_ERRORS wraps generation+judge, logs+skips leaving a resumable gap,
      non-transient errors still propagate; --resume appends to existing JSONL skipping
      completed (system,question_id) pairs and re-accumulating prior cost for the ceiling,
      supersedes the old separate-run_id workaround), cost accounting
      (price-table-in-config, None on missing price; two-call combined cost — cheap always +
      strong iff escalated, None→0.0, model/system="router" — manufactured by the router as the
      single owner; the runner cost-guard invariant: recompute generator cost_usd only when None,
      so a pre-set cost is owned not recomputed and the price-less "router" row survives,
      backwards-compatible for the three concrete generators, ADR-0012),
      cost-per-correct-answer metric (phase-3, shipped: sum(gen.cost_usd)/count(correct)
      per system; judge cost excluded — eval overhead not a deployment figure; None on
      zero-correct denominator; None summand → 0.0; caller groups by system before
      calling; head-to-head metric for router-vs-baselines; null result — routing
      dominated — is a valid finding; docs/analysis/routing-verdict.md),
      HTML+MD report rendering
      (string.Template, None->N/A, dynamic k), stats-capture seam
      (generate_with_stats / judge_with_stats on implementations), AnthropicGenerator
      (forced tool-use, max_retries=8, timeout=120), BGE-M3 encoder thread-safety
      (retrieve_lock), failure-mode triage clustering (groupby-aggregate over classified
      JSONL, frozen TriageReport/TriageCluster, SCHEMA_VERSION cross-phase contract,
      deterministic representative + sort), and triage-to-issues (grounded GitHub Issue
      drafts, body-marker fingerprint idempotency, GitHubClient Protocol seam, dry-run
      default, schema gate), bronze raw-archive (BronzeWriter — opt-in persist_bronze,
      run_id-keyed JSON-per-call under data/raw_eval/, own-lock/flush/overwrite-idempotency,
      run_id path-sanitization; RawCall 3rd-return transport, off-Protocol + off-gold, ADR-0010),
      and CallStats.confidence_score (float|None=None, Gemini-only verbalized confidence
      in [0,1], same optional-default pattern as cost_usd, escalation signal, ADR-0011).
      ADRs: 0001, 0006, 0007, 0009, 0010, 0011, 0012.
      FactVerdict fields: fact, verdict (Literal present/absent/contradicted),
      supporting_doc_id (str|None=None, additive sprint-8/phase-1 — the retrieved doc_id
      most directly supporting a gold fact, or None; strict-mode-compatible via
      __get_pydantic_json_schema__ hook that forces explicit ["string","null"] type-union
      and injects the field into required, keeping schema-as-SSoT: no parallel JSON string).
    path: rag-eval/
