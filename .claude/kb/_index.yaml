version: "1.0"
last_updated: "2026-06-01"

limits:
  quick_reference: 100
  concept: 150
  pattern: 200

templates:
  - name: concept
    path: _templates/concept.md.template
  - name: pattern
    path: _templates/pattern.md.template
  - name: index
    path: _templates/index.md.template
  - name: quick-reference
    path: _templates/quick-reference.md.template
  - name: domain-manifest
    path: _templates/domain-manifest.yaml.template

# Domains are added as content stabilizes. See .claude/STRUCTURE_GUIDE.md
# § Self-Improvement Protocol for the trigger and bootstrap steps.
#
# Likely first domains for this project:
#   - rag-retrieval     (Sprint 1+: hybrid BM25+dense, chunking, expected_doc_ids)
#   - rag-eval          (Sprint 2+: per-fact judge, recall@k, abstention)
#   - observability     (Sprint 3+: OTel, Langfuse/Phoenix, failure taxonomy)
#
# Domain entry shape — the single SSoT is _templates/domain-manifest.yaml.template.
# kb-architect copies that block in here when registering a domain.
domains:
  rag-eval:
    name: RAG Eval
    description: >
      LLM-as-judge evaluation of RAG answers — per-fact recall/precision scoring
      against gold answer_facts, doc-level (per-doc_id) citation faithfulness, the
      None empty-denominator/abstention convention, structured-output judge prompting,
      judge determinism (strict schema + discrete verdict vocabulary), retrieval metric
      aggregation (per-category, None-skipping, dedup-before-metrics), abstention
      scoring (empty-gold predicate, two-layer gate+generator, sentinel enforcement),
      cassette/replay testing with vcrpy (ADR-0006), multi-model sweep runner
      (single retriever, crash-safe JSONL flush, cost ceiling), cost accounting
      (price-table-in-config, None on missing price), HTML+MD report rendering
      (string.Template, None->N/A, dynamic k), stats-capture seam
      (generate_with_stats / judge_with_stats on implementations), AnthropicGenerator
      (forced tool-use, max_retries=8, timeout=120), and BGE-M3 encoder thread-safety
      (retrieve_lock). ADRs: 0001, 0006, 0007.
    path: rag-eval/
    status: draft
    last_updated: "2026-05-26"
    agents: [kb-architect]
    pillars_used: [codebase, mcp]
    entry_points:
      index: index.md
      quick_reference: quick-reference.md
    concepts:
      - name: per-doc-faithfulness
        path: concepts/per-doc-faithfulness.md
        confidence: 0.95
      - name: none-empty-denominator
        path: concepts/none-empty-denominator.md
        confidence: 0.95
      - name: schema-as-ssot
        path: concepts/schema-as-ssot.md
        confidence: 0.90
      - name: judge-determinism
        path: concepts/judge-determinism.md
        confidence: 0.85
      - name: retrieval-metric-aggregation
        path: concepts/retrieval-metric-aggregation.md
        confidence: 0.95
      - name: abstention-scoring
        path: concepts/abstention-scoring.md
        confidence: 0.95
      - name: eval-record-schema
        path: concepts/eval-record-schema.md
        confidence: 0.95
      - name: cost-accounting
        path: concepts/cost-accounting.md
        confidence: 0.95
      - name: stats-capture-seam
        path: concepts/stats-capture-seam.md
        confidence: 0.95
    patterns:
      - name: per-fact-judge-call
        path: patterns/per-fact-judge-call.md
        confidence: 0.95
      - name: offline-ci-judge
        path: patterns/offline-ci-judge.md
        confidence: 0.95
      - name: cassette-replay-eval
        path: patterns/cassette-replay-eval.md
        confidence: 0.95
