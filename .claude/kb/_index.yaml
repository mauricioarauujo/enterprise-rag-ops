version: "1.0"
last_updated: "2026-05-20"

limits:
  quick_reference: 100
  concept: 150
  pattern: 200

templates:
  - name: concept
    path: _templates/concept.md.template
  - name: pattern
    path: _templates/pattern.md.template
  - name: index
    path: _templates/index.md.template
  - name: quick-reference
    path: _templates/quick-reference.md.template
  - name: domain-manifest
    path: _templates/domain-manifest.yaml.template

# Domains are added as content stabilizes. See .claude/STRUCTURE_GUIDE.md
# § Self-Improvement Protocol for the trigger and bootstrap steps.
#
# Likely first domains for this project:
#   - rag-retrieval     (Sprint 1+: hybrid BM25+dense, chunking, expected_doc_ids)
#   - rag-eval          (Sprint 2+: per-fact judge, recall@k, abstention)
#   - observability     (Sprint 3+: OTel, Langfuse/Phoenix, failure taxonomy)
#
# Domain entry shape — the single SSoT is _templates/domain-manifest.yaml.template.
# kb-architect copies that block in here when registering a domain.
domains:
  rag-eval:
    name: RAG Eval
    description: >
      LLM-as-judge evaluation of RAG answers — per-fact recall/precision scoring
      against gold answer_facts, doc-level (per-doc_id) citation faithfulness, the
      None empty-denominator/abstention convention, structured-output judge prompting,
      and judge determinism (strict schema + discrete verdict vocabulary).
    path: rag-eval/
    status: draft
    last_updated: "2026-05-24"
    agents: [kb-architect]
    pillars_used: [codebase, mcp]
    entry_points:
      index: index.md
      quick_reference: quick-reference.md
    concepts:
      - name: per-doc-faithfulness
        path: concepts/per-doc-faithfulness.md
        confidence: 0.95
      - name: none-empty-denominator
        path: concepts/none-empty-denominator.md
        confidence: 0.95
      - name: schema-as-ssot
        path: concepts/schema-as-ssot.md
        confidence: 0.90
      - name: judge-determinism
        path: concepts/judge-determinism.md
        confidence: 0.85
    patterns:
      - name: per-fact-judge-call
        path: patterns/per-fact-judge-call.md
        confidence: 0.95
      - name: offline-ci-judge
        path: patterns/offline-ci-judge.md
        confidence: 0.95

  rag-retrieval:
    name: RAG Retrieval
    description: >
      Hybrid retrieval over the document corpus — chunking strategy, BM25 + dense
      embedding, score fusion, metadata filtering, vector-store choice, and retrieval
      evaluation (recall@k / precision@k / MRR / nDCG over expected_doc_ids).
    path: rag-retrieval/
    status: draft
    last_updated: "2026-05-20"
    agents: [kb-architect]
    pillars_used: [codebase, mcp, deep-research]
    research_source: _research/archive/rag-retrieval-2026-05-17.md
    entry_points:
      index: index.md
      quick_reference: quick-reference.md
    concepts:
      - name: chunking-strategies
        path: concepts/chunking-strategies.md
        confidence: 0.85
      - name: lexical-vs-semantic
        path: concepts/lexical-vs-semantic.md
        confidence: 0.90
      - name: hybrid-score-fusion
        path: concepts/hybrid-score-fusion.md
        confidence: 0.85
      - name: metadata-filtering
        path: concepts/metadata-filtering.md
        confidence: 0.90
      - name: retrieval-eval-metrics
        path: concepts/retrieval-eval-metrics.md
        confidence: 0.90
      - name: reranking
        path: concepts/reranking.md
        confidence: 0.85
      - name: frontier-2026
        path: concepts/frontier-2026.md
        confidence: 0.70
    patterns:
      - name: hybrid-retrieve-fuse
        path: patterns/hybrid-retrieve-fuse.md
        confidence: 0.95
      - name: expected-doc-ids-smoke
        path: patterns/expected-doc-ids-smoke.md
        confidence: 0.95
