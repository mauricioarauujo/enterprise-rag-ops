  rag-generation:
    name: RAG Generation
    description: >
      The Generator Protocol seam and its three-provider matrix (OpenAI / Anthropic / Google):
      the AnswerWithSources closed-schema output contract (extra="forbid", ABSTAIN_ANSWER sentinel),
      model-agnostic shared prompt (build_system_prompt / build_user_prompt), _GENERATOR_FACTORY
      dispatch by model.system, and the three divergent structured-output mechanisms
      (OpenAI strict:true JSON schema; Anthropic forced tool-use; Gemini open-schema mirror
      _GeminiResponseSchema because Gemini rejects additionalProperties — live 400 INVALID_ARGUMENT),
      with closed-schema enforcement always applied client-side via model_validate_json.
      Per-provider token accounting: OpenAI prompt_tokens/completion_tokens; Anthropic
      input_tokens/output_tokens; Gemini prompt_token_count + candidates_token_count +
      thoughts_token_count (Gemini 2.5 thinking tokens billed as output but excluded from
      candidates). Retry hardening born from real sweep throttling (Anthropic max_retries=8;
      Gemini HttpRetryOptions attempts=8). Cassette key-scrub headers per provider.
      ADRs: 0003 (Generator seam + structured outputs + abstention), 0005 (three-provider matrix
      + Gemini schema-dialect amendment). Raw-payload serialization (phase-19): *_with_stats
      returns a 3rd RawCall(request, response) built by a defensive per-provider _serialize_response
      (pydantic model_dump(mode="json") fast path → manual getattr fallback → never raises);
      off-Protocol, off-gold, shared OpenAI serializer between generator and judge.
      Gemini 2.5 operational limits (ADR-0011): no token logprobs on Flash/Flash-Lite (400
      INVALID_ARGUMENT on response_logprobs — never set it); older logprob models retired (404).
      Verbalized-confidence pattern: _GeminiResponseSchema adds confidence:float + _CONFIDENCE_ADDENDUM
      on system prompt; _parse_confidence extracts+clamps to [0,1] defensively; field stripped
      before AnswerWithSources.model_validate so shared closed schema is unchanged; signal rides
      CallStats.confidence_score (float|None=None, Gemini-only).
      Router cascade composite (sprint-7/phase-2, ADR-0012): RouterGenerator composes two
      injected Generators (cheap-default, escalate-on-low-trust) and conforms to the seam
      STRUCTURALLY via generate (no inheritance, no _GENERATOR_FACTORY registration,
      interfaces.py untouched); escalate unless confident-AND-not-abstaining (missing confidence
      → escalate); single-owner combined cost (cheap always + strong iff escalated, None→0.0,
      model="router"); gen_raw = the cheap call's RawCall. Pairs with the rag-eval runner
      cost-guard invariant. ADRs: 0003, 0005, 0011, 0012.
      Phase-3 measured outcome (sprint-7/phase-3): router is strictly dominated — $0.0061/correct
      vs cheap Gemini $0.0007 and GPT-5 Nano $0.0030 (best quality, 2× cheaper); ≈52% escalation
      rate confirmed as ADR-0011 predicted; null result is the honest baseline
      (docs/analysis/routing-verdict.md).
