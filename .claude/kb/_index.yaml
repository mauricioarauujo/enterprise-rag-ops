  observability:
    name: Observability
    description: >
      Observability for the custom RAG eval harness — OTel-GenAI / OpenInference span trees
      (chain → retriever → generation → judge), the deterministic eval-JSONL → Arize Phoenix
      replay exporter (reset-and-replay idempotency, no upsert-by-seed), span-attribute mapping
      (OpenInference retrieval.documents.* + gen_ai.* conventions), cost/token economics on
      spans (cost_usd omitted when None), offline score write-back (log_span_annotations_dataframe),
      ScoreSink Protocol seam for tool-swap, opt-in content enrichment (--enrich-from-index
      hydrates retrieval.documents.{i}.document.content at the exporter boundary from corpus.jsonl;
      pure mapper attributes.py unchanged; .score still out — not in EvalRecord),
      and the rule-based failure-mode taxonomy
      (5-label first-match cascade over EvalRecord aggregates + gold Questions,
      HALLUCINATION_FAITHFULNESS_THRESHOLD=0.5, INCOMPLETE_RECALL_THRESHOLD=0.5).
      Sprint 6 — LLM-span I/O hydration for Phoenix Info-tab legibility: chain input.value
      (gold question, opt-in at the exporter boundary via --enrich-from-questions), generation
      output.value (answer, always-on), judge output.value (per-fact/per-citation verdict as
      text/plain, always-on, omit-guarded when no verdicts).
      ADRs: 0004 (tool — Phoenix deployed, Langfuse rejected on 8 GB hardware),
      0008 (taxonomy), 0007 (schema).
