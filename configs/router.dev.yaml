# Sprint-7/phase-2 cost-router — dev variant for rapid iteration (FR-11 Should, AC-12).
# Same router block as configs/router.yaml, but 5 questions and NO cost ceiling so a quick
# smoke run never halts mid-sweep. Writes results/router-dev.jsonl.

models: []

router:
  cheap_model_id: "gemini-2.5-flash-lite"
  strong_model_id: "claude-haiku-4-5-20251001"
  threshold: 1.0

judge_model: "gpt-5-nano-2025-08-07"

limit: 5
k: 10
output_dir: "results"
run_id: "router-dev"

prices:
  gemini-2.5-flash-lite:
    input_usd_per_1m: 0.10
    output_usd_per_1m: 0.40
  claude-haiku-4-5-20251001:
    input_usd_per_1m: 1.00
    output_usd_per_1m: 5.00
  gpt-5-nano-2025-08-07:
    input_usd_per_1m: 0.05
    output_usd_per_1m: 0.40
