name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: |
          uv run ruff format --check src tests
          uv run ruff check src tests

      - name: Test (pytest)
        # The `corpus` marker validates data/processed/corpus.jsonl, which is
        # gitignored and absent in CI — it runs locally via `make check-data`.
        run: uv run pytest -m "not corpus" --cov --cov-report=term
