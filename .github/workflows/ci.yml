name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      # CI calls the Make targets so the gate is defined once, in the Makefile —
      # `make verify` locally and CI cannot drift apart. `make test` excludes the
      # `corpus` marker (it validates the gitignored corpus, run via `make
      # check-data`).
      - name: Lint
        run: make lint

      - name: Test
        run: make test-cov
