name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      # CI calls the Make targets so the gate is defined once, in the Makefile —
      # `make lint`/`make test` locally and CI cannot drift apart. `make test` excludes the
      # `corpus` marker (it validates the gitignored corpus, run via `make
      # check-data`).
      - name: Lint
        run: make lint

      - name: Test
        run: make test-cov

  # ── Kbind discipline gates (appended by /kbind:harness-adopt, 2026-07-01) ──
  # spec-status is intentionally NOT wired: this repo's spec area (.claude/sdd/) uses the
  # SDD dialect (BRAINSTORM/DEFINE/DESIGN), not the kbind Spec status ladder — the check
  # is shape-N/A until/unless the repo converges (docs/kbind-adoption.md § 4).
  discipline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - name: adr-trace (blocking — note, currently vacuous; repo ADRs use Status sections, not frontmatter)
        run: python3 .claude/scripts/adr_trace_check.py docs/adr
      - name: kb-health (advisory — KB budgets / research-loop debt)
        run: python3 .claude/scripts/kb_health.py
        continue-on-error: true
