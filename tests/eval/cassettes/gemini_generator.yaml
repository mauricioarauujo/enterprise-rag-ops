    body: '{"contents": [{"parts": [{"text": "[1] test_doc: The default port for HTTP
      traffic is 80; for HTTPS it is 443.\n\nWhat is the default port for HTTP traffic?"}],
      "role": "user"}], "systemInstruction": {"parts": [{"text": "You are an enterprise
      knowledge assistant. Answer the user''s question using only the numbered context
      provided. Cite the doc_id of every context entry you used in the `sources` field.
      If the context does not contain enough information to answer, you MUST set `answer`
      to exactly this string \u2014 \"I don''t have enough information to answer this
      question.\" \u2014 and return an empty `sources` list. Do not answer from prior
      knowledge.\n\nRespond with a single JSON object matching this schema:\n{\n  \"additionalProperties\":
      false,\n  \"description\": \"An LLM-produced answer with cited document identifiers.\\n\\nFields:\\n    answer:
      Natural-language answer string. Empty string is allowed by the\\n        schema
      but flagged by the smoke gate (AC-13).\\n    sources: List of `doc_id` strings
      cited as evidence. Order is the order\\n        the model emitted them; deduplication
      is the model''s responsibility.\\n\\nInvariants:\\n    - Both fields are required
      (Pydantic raises `ValidationError` on\\n      missing or wrong type \\u2014
      AC-1).\\n    - The schema is closed (`extra=\\\"forbid\\\"` \\u2192 `additionalProperties:
      false`\\n      in JSON Schema), so OpenAI `strict: true` mode rejects any extra
      fields.\",\n  \"properties\": {\n    \"answer\": {\n      \"description\": \"Natural-language
      answer to the user question.\",\n      \"title\": \"Answer\",\n      \"type\":
      \"string\"\n    },\n    \"sources\": {\n      \"description\": \"doc_id values
      cited as evidence for the answer.\",\n      \"items\": {\n        \"type\":
      \"string\"\n      },\n      \"title\": \"Sources\",\n      \"type\": \"array\"\n    }\n  },\n  \"required\":
      [\n    \"answer\",\n    \"sources\"\n  ],\n  \"title\": \"AnswerWithSources\",\n  \"type\":
      \"object\"\n}"}], "role": "user"}, "generationConfig": {"responseMimeType":
      "application/json", "responseSchema": {"description": "Open-schema mirror of
      `AnswerWithSources` for Gemini''s `response_schema`.\n\nGemini''s structured-output
      schema dialect rejects `additionalProperties`, which\n`AnswerWithSources` emits
      because of its `extra=\"forbid\"` config (passing it directly\nyields a 400
      `Unknown name \"additional_properties\"`). So the schema handed to the SDK\nis
      this open variant; the real *closed*-schema contract is still enforced our side
      by\n`AnswerWithSources.model_validate_json(resp.text)` (FR-3), so a Gemini response
      with an\nextra field still raises. Fields mirror `AnswerWithSources` exactly.",
